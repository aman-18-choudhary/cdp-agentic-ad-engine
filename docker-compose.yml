version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ──────────────────────────────────────────────
  # Redpanda – Kafka-compatible message broker
  # ──────────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.19
    container_name: cdp-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9093,external://0.0.0.0:19093
      - --advertise-kafka-addr internal://redpanda:9093,external://localhost:19093
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
    ports:
      - "19093:19093"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18082/topics"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ──────────────────────────────────────────────
  # MongoDB – Profile store with Change Streams
  # ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: cdp-mongodb
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --port
      - "27017"
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: |
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    logging: *default-logging

  # ──────────────────────────────────────────────
  # Qdrant – Vector database
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: cdp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ──────────────────────────────────────────────
  # MinIO – S3-compatible object store (Data Lake)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cdp-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: cdpadmin
      MINIO_ROOT_PASSWORD: cdpadmin123
      MINIO_BROWSER: "on"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ──────────────────────────────────────────────
  # Ollama – Local LLM serving
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.3.0
    container_name: cdp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 5
        ollama pull ${OLLAMA_CHAT_MODEL:-qwen2.5:3b}
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging: *default-logging

  # ──────────────────────────────────────────────
  # Redis – Caching for ad serving
  # ──────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cdp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging

  # ──────────────────────────────────────────────
  # MinIO bucket setup (one-shot init)
  # ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: cdp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set cdp http://minio:9000 cdpadmin cdpadmin123
        mc mb cdp/raw-events --ignore-existing
        echo "✅ MinIO buckets created"
    logging: *default-logging

volumes:
  redpanda-data:
  mongo-data:
  qdrant-data:
  minio-data:
  ollama-data:
  redis-data:
