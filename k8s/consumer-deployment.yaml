apiVersion: v1
kind: ConfigMap
metadata:
  name: consumer-config
  namespace: default
data:
  KAFKA_BOOTSTRAP_SERVERS: "redpanda.default.svc.cluster.local:9093"
  KAFKA_TOPIC_PLATFORM_A: "platform-a-events"
  KAFKA_TOPIC_PLATFORM_B: "platform-b-events"
  KAFKA_CONSUMER_GROUP: "cdp-event-consumer"
  MONGODB_DATABASE: "cdp"
  MONGODB_PROFILE_COLLECTION: "unified_profiles"
  S3_ENDPOINT_URL: "http://minio.default.svc.cluster.local:9000"
  S3_BUCKET_RAW_EVENTS: "raw-events"
  S3_REGION: "us-east-1"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: consumer-secret
  namespace: default
type: Opaque
stringData:
  MONGODB_URI: "mongodb://mongodb-0.mongodb-headless.default.svc.cluster.local:27017,mongodb-1.mongodb-headless.default.svc.cluster.local:27017/cdp?replicaSet=rs0"
  S3_ACCESS_KEY_ID: "cdpadmin"
  S3_SECRET_ACCESS_KEY: "cdpadmin123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdp-consumer
  namespace: default
  labels:
    app: cdp-consumer
    component: event-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cdp-consumer
  template:
    metadata:
      labels:
        app: cdp-consumer
        component: event-consumer
    spec:
      containers:
        - name: consumer
          image: cdp-consumer:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - consumers.event_consumer
          envFrom:
            - configMapRef:
                name: consumer-config
            - secretRef:
                name: consumer-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - containerPort: 8080
              name: health
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
