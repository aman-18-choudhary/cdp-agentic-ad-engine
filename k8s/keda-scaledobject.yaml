apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: cdp-consumer-scaler
  namespace: default
  labels:
    app: cdp-consumer
    component: autoscaler
spec:
  scaleTargetRef:
    name: cdp-consumer
    apiVersion: apps/v1
    kind: Deployment
  pollingInterval: 10
  cooldownPeriod: 30
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: redpanda.default.svc.cluster.local:9093
        consumerGroup: cdp-event-consumer
        topic: platform-a-events
        lagThreshold: "100"
        # Offset reset policy for initial consumption
        offsetResetPolicy: earliest
      authenticationRef:
        name: keda-kafka-trigger-auth
    - type: kafka
      metadata:
        bootstrapServers: redpanda.default.svc.cluster.local:9093
        consumerGroup: cdp-event-consumer
        topic: platform-b-events
        lagThreshold: "100"
        offsetResetPolicy: earliest
      authenticationRef:
        name: keda-kafka-trigger-auth
---
apiVersion: v1
kind: Secret
metadata:
  name: keda-kafka-secret
  namespace: default
type: Opaque
stringData:
  # No SASL authentication for local Redpanda; plaintext connection
  sasl: ""
  tls: ""
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-kafka-trigger-auth
  namespace: default
spec:
  secretTargetRef:
    - parameter: sasl
      name: keda-kafka-secret
      key: sasl
    - parameter: tls
      name: keda-kafka-secret
      key: tls
