apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: cdp
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_REPLICA_SET_NAME
              value: rs0
          command:
            - mongod
            - --replSet
            - rs0
            - --bind_ip_all
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: cdp
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb
