name: CDP Agentic Ad Engine — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

env:
  PYTHON_VERSION: "3.12"
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_BASE: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check \
            agents/ \
            api/ \
            common/ \
            consumers/ \
            simulators/ \
            uid_engine/ \
            vector_store/ \
            tests/ \
            scripts/ \
            --ignore=E501

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.10.0
        ports:
          - 6333:6333
      redpanda:
        image: docker.redpanda.com/redpandadata/redpanda:v23.3.19
        command:
          - redpanda
          - start
          - --kafka-addr internal://0.0.0.0:9093,external://0.0.0.0:19093
          - --advertise-kafka-addr internal://redpanda:9093,external://localhost:19093
          - --mode dev-container
          - --smp 1
          - --memory 512M
        ports:
          - 19093:19093

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock httpx mongomock

      - name: Prepare test data
        run: |
          python scripts/prepare_data.py --seed 42 --output-dir data

      - name: Run pytest
        run: |
          python -m pytest tests/ \
            -v \
            --asyncio-mode=auto \
            --timeout=30 \
            -x \
            --tb=short
        env:
          MONGODB_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379/0
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          KAFKA_BOOTSTRAP_SERVERS: localhost:19093

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cdp-consumer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: consumer
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASE }}/cdp-consumer:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASE }}/cdp-consumer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cdp-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: api
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASE }}/cdp-api:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASE }}/cdp-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure K3s
        uses: debianmaster/actions-k3s@v3
        with:
          k3s_version: v1.29.0

      - name: Deploy Helm chart
        run: |
          helm upgrade --install cdp-cd ./k8s \
            --namespace cdp \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m

  drift-check:
    name: Terraform Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Configure K3s
        uses: debianmaster/actions-k3s@v3
        with:
          k3s_version: v1.29.0

      - name: Terraform Init & Plan
        id: plan
        run: |
          cd infra
          terraform init
          terraform plan -out=tfplan -detailed-exitcode 2>&1 | tee tfplan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Report drift as PR comment
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('infra/tfplan_output.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 1,
              body: `## Terraform Drift Detected 🚨\n\n\`\`\`\n${planOutput.slice(0, 30000)}\n\`\`\``
            });
